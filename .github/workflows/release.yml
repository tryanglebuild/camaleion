name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to create GitHub Releases

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Build shared ──────────────────────────────────────────────────────────
      - name: Build shared
        run: pnpm --filter @context-engine/shared build

      # ── Build web-ui standalone ───────────────────────────────────────────────
      - name: Build web-ui
        working-directory: packages/web-ui
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Package web standalone
        run: |
          STANDALONE=packages/web-ui/.next/standalone
          # server.js does process.chdir(__dirname) so static assets must live
          # next to it at packages/web-ui/.next/static and packages/web-ui/public
          mkdir -p $STANDALONE/packages/web-ui/.next/static
          mkdir -p $STANDALONE/packages/web-ui/public
          cp -r packages/web-ui/.next/static/. $STANDALONE/packages/web-ui/.next/static/
          cp -r packages/web-ui/public/. $STANDALONE/packages/web-ui/public/ 2>/dev/null || true
          # Add version file at root so cli-web can read it
          VERSION="${{ github.ref_name }}"
          echo "{\"version\":\"${VERSION#v}\"}" > $STANDALONE/version.json
          # Add empty default config.json so server finds the file on first boot
          echo '{"supabaseUrl":"","supabaseAnonKey":"","supabaseServiceKey":"","supabaseAccessToken":"","openrouterKey":""}' \
            > $STANDALONE/packages/web-ui/config.json
          # Create tarball (contents extracted directly to install dir)
          tar -czf web-standalone.tar.gz -C $STANDALONE .
        shell: bash

      # ── Build MCP server ──────────────────────────────────────────────────────
      - name: Build mcp-server
        run: pnpm --filter camaleon-mcp-server build

      # ── Build CLI packages ────────────────────────────────────────────────────
      - name: Build cli-web
        run: pnpm --filter camaleon-web build

      - name: Build cli-mcp
        run: pnpm --filter camaleon-mcp build

      # ── GitHub Release ────────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: web-standalone.tar.gz
          generate_release_notes: true

      # ── Publish to npm (skip if version already exists) ──────────────────────
      - name: Publish camaleon-mcp-server
        working-directory: packages/mcp-server
        run: npm publish --access public || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish camaleon-web
        working-directory: packages/cli-web
        run: npm publish --access public || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish camaleon-mcp
        working-directory: packages/cli-mcp
        run: npm publish --access public || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
